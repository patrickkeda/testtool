  # 注意：执行 JSON 文件的云端上传操作，完成测试数据的云端备份
  - id: step_9
    name: UploadJsonToCloud
    type: engineer.test
    params:
      command: 'upload=1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30

    state_measurement_config: null
    manual_judgment_config: null

  # Step 3: 狗头标志位检测 (testinfo=0,x5mod%)
  - id: step_3
    name: CheckDogHeadFlag
    type: engineer.test
    params:
      command: 'testinfo=0,x5%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 20
    timeout: 25000
    retries: 1
    condition: null
    expect: null

version: '1.0'
metadata:
  name: vita01-uwb-1
  description: 'VITA 机器人 UWB 测试流程'
  author: 'TestTool'
  created_at: '2025-10-30T17:10:00.000000'
  product: Vita01
  station: UWB
  version: '1.0'

variables:
  robot_ip: "192.168.126.2"
  robot_port: 3579

steps:

  # Step MES-0: MES初始化（MesInit）
  - id: step_mes_0
    name: MESInit
    type: mes.heartbeat
    params: {}
    timeout: 8000
    retries: 2
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null
  - id: step_1
    name: ScanSN
    type: scan.sn
    params: {}
    timeout: 5000
    retries: 3
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 2: 进入工程模式

  # Step MES-1: MesStart（按SN判站/获取工单）
  - id: step_mes_1
    name: MesStartCheckStation
    type: mes.get_work_order
    params:
      sn: '${sn}'
      expected_station: '${mes.effective_station}'
    timeout: 15000
    retries: 1
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null
  - id: step_2
    name: EnterEngineerMode
    type: engineer.test
    params:
      command: 'enfac=1,1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 2
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 3: 狗头标志位检测 (testinfo=0,x5mod%)
  - id: step_3
    name: CheckDogHeadFlag
    type: engineer.test
    params:
      command: 'testinfo=0,x5%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 20
    timeout: 25000
    retries: 1
    condition: null
    expect: null
    on_failure: fail

  # Step 4: S100 标志位检测 (testinfo=0,s100%)
  - id: step_4
    name: CheckS100Flag
    type: engineer.test
    params:
      command: 'testinfo=0,s100%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 20
    timeout: 25000
    retries: 1
    condition: null
    expect: null
    on_failure: fail

  # Step 5: 狗头解除舵机锁定 (sensorcal=0%)
  - id: step_5
    name: UnlockHeadServo
    type: engineer.test
    params:
      command: 'sensorcal=0%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail

  # Step 6: 操作提示 - 弹出确认对话框
  - id: step_6
    name: FixtureInstruction
    type: utility.confirm
    params:
      title: '治具操作提示'
      message: '请将狗放入标定治具上，并确认治具已锁紧'
      confirm_text: '确认'
      allow_cancel: false
    timeout: null
    retries: 0
    condition: null
    expect: null
    on_failure: fail

  # Step 8: UWB 测试 (uwb=1,Vbot_FCF9E2BAF5B6%)
  - id: step_8
    name: UWBTest1
    type: engineer.test
    params:
      command: 'uwb=1,Vbot_E835AC7E21D5%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail

  # Step 9: UWB 测试 (uwb=3%)
  - id: step_9
    name: UWBTest2
    type: engineer.test
    params:
      command: 'uwb=3%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 100
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail

  # Step 10: UWB 测试 (uwb=2%)
  - id: step_10
    name: UWBTest3
    type: engineer.test
    params:
      command: 'uwb=2%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail

  # Step 13: stage2设置为1 (stage=1,2,1%)
  - id: step_13
    name: ConfirmFusionFlag
    type: engineer.test
    params:
      command: 'stage=1,3,1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
      skip_log_response: true  # 跳过响应日志记录
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail

  # Step 11: 关机 (poweroff=1%)
  - id: step_11
    name: PowerOff
    type: engineer.test
    params:
      command: 'poweroff=1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail



  # Step MES-2: MesEnd上传测试结果（自动按测试最终结果上传PASS/FAIL）
  - id: step_mes_2
    name: MesEnd2UploadResult
    type: mes.upload_result
    params:
      prompt_overall_result: false
      overall_result: '${context.result}'
      error_message: '${context.error_message}'
      use_mes_end: false
    timeout: 15000
    retries: 1
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null
timeout: null
retries: 0
on_failure: stop


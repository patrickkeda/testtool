version: '1.0'
metadata:
  name: mes-debug
  description: 'MES联调：判站/工站来自 config；第4步弹窗选择上传 PASS/FAIL；上传走 MesEnd2（含 AllData）。若不要弹窗可设 prompt_overall_result: false 并写 overall_result'
  author: 'TestTool'
  created_at: '2026-04-16T00:00:00'
  product: Debug
  station: '${mes.effective_station}'
  version: '1.0'

variables: {}

steps:
  - id: step_1
    name: MESInit
    type: mes.heartbeat
    params: {}
    timeout: 8000
    retries: 2
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  - id: step_2
    name: ScanSN
    type: scan.sn
    params:
      dialog_title: MES调试-SN输入
      hint: 请输入或扫描用于MES联调的SN
      regex: '^[A-Za-z0-9_-]{6,64}$'
      timeout_ms: 120000
    timeout: 120000
    retries: 0
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  - id: step_3
    name: MesStartCheckStation
    type: mes.get_work_order
    params:
      sn: '${sn}'
      expected_station: '${mes.effective_station}'
    timeout: 15000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  - id: step_4
    name: MesEnd2UploadResult
    type: mes.upload_result
    params:
      prompt_overall_result: true
      choice_title: MES上传
      choice_message: 请选择本次 MesEnd2 上传为测试通过或失败（PASS→ErrorCode 0；FAIL→配置项 failure_error_code）
      pass_button_text: 上传成功(PASS)
      fail_button_text: 上传失败(FAIL)
      allow_cancel_choice: true
      use_mes_end: false
    timeout: 15000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

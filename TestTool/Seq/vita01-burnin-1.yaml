version: '1.0'
metadata:
  name: vita01-burnin-1
  description: 'VITA 机器人煲机测试流程'
  author: 'TestTool'
  created_at: '2026-03-11T00:00:00.000000'
  product: Vita01
  station: BURNIN
  version: '1.0'

variables:
  robot_ip: "192.168.126.2"
  robot_port: 3579

steps:

  # Step MES-0: MES初始化（MesInit）
  - id: step_mes_0
    name: MESInit
    type: mes.heartbeat
    params: {}
    timeout: 8000
    retries: 2
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null
  - id: step_1
    name: ScanSN
    type: scan.sn
    params: {}
    timeout: 5000
    retries: 3
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 2: 进入工程模式

  # Step MES-1: MesStart（按SN判站/获取工单）
  - id: step_mes_1
    name: MesStartCheckStation
    type: mes.get_work_order
    params:
      sn: '${sn}'
      expected_station: '${mes.effective_station}'
    timeout: 15000
    retries: 1
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null
  - id: step_2
    name: EnterEngineerMode
    type: engineer.test
    params:
      command: 'enfac=1,1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 2
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 3: stage2设置为1 (stage=1,2,1%)
  - id: step_3
    name: ConfirmFusionFlag
    type: engineer.test
    params:
      command: 'stage=1,5,1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
      skip_log_response: true  # 跳过响应日志记录
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail

  # Step 4: 开始煲机动作
  - id: step_4
    name: StartBurnIn
    type: engineer.test
    params:
      command: 'action_mode=1,navi,1800%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 5: 煲机倒计时 1800 秒
  - id: step_5
    name: BurnInCountdown
    type: utility.delay
    params:
      duration_ms: 1800000
      title: '煲机倒计时'
      message: '机器人煲机中，请保持设备运行。剩余时间 {mmss}'
      show_countdown: true
    timeout: 1810000
    retries: 0
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step MES-2: MesEnd上传测试结果（自动按测试最终结果上传PASS/FAIL）
  - id: step_mes_2
    name: MesEnd2UploadResult
    type: mes.upload_result
    params:
      prompt_overall_result: false
      overall_result: '${context.result}'
      error_message: '${context.error_message}'
      use_mes_end: false
    timeout: 15000
    retries: 1
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

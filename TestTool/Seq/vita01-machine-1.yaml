    manual_judgment_config: null

  # Step 13: 站起来
  - id: step_13
    name: StandUp
    type: engineer.test
    params:
      command: 'action_mode=1,rl_stand%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000

  # Step 13: stage2设置为1 (stage=1,6,1%)
  - id: step_13
    name: ConfirmFusionFlag
    type: engineer.test
    params:
      command: 'stage=1,6,1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
      skip_log_response: true  # 跳过响应日志记录
    timeout: 35000
    retries: 1
    condition: null

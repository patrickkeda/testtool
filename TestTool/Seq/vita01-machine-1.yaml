  #   manual_judgment_config: null

  # # Step 4: 读取机器狗版本
  # - id: step_4
  #   name: ReadVersion
  #   type: engineer.test
  #   params:
  #     command: 'version=0%'
  #     robot_ip: '${robot_ip}'
  #     port: ${robot_port}

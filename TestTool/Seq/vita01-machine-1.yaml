version: '1.0'
metadata:
  name: vita01-machine-1
  description: 'VITA 机器人整机测试流程'
  author: 'TestTool'
  created_at: '2025-01-15T00:00:00.000000'
  product: Vita01
  station: MACHINE
  version: '1.0'

variables:
  robot_ip: "192.168.126.2"
  robot_port: 3579

steps:

  # Step MES-0: MES初始化（MesInit）
  - id: step_mes_0
    name: MESInit
    type: mes.heartbeat
    params: {}
    timeout: 8000
    retries: 2
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null
  - id: step_1
    name: ScanSN
    type: scan.sn
    params:
      dialog_title: '扫描/输入产品SN'
      hint: '请扫描/输入SN（共19位，且前5位为80100）后回车'
      regex: '^80100[A-Z0-9]{14}$'
      timeout_ms: 60000
    timeout: 5000
    retries: 3
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 2: 进入工程模式

  # Step MES-1: MesStart（按SN判站/获取工单）
  - id: step_mes_1
    name: MesStartCheckStation
    type: mes.get_work_order
    params:
      sn: '${sn}'
      expected_station: '${mes.effective_station}'
    timeout: 15000
    retries: 1
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null
  - id: step_2
    name: EnterEngineerMode
    type: engineer.test
    params:
      command: 'enfac=1,1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 2
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 3: 写入 SN
  - id: step_3
    name: WriteSN
    type: engineer.test
    params:
      command: 'pn=1,sn,${sn}%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 2
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # # Step 4: 舵机标定
  # - id: step_4
  #   name: ServoCalibration
  #   type: engineer.test
  #   params:
  #     command: 'servo=2%'
  #     robot_ip: '${robot_ip}'

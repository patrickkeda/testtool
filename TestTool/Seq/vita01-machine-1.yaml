  #   manual_judgment_config: null

  # Step 4: 读取 SOC (读取 x5 和 s100 的 soc_id)
  # 注意：socid=0% 命令可能返回 x5 和 s100 的 soc_id，需要根据实际响应格式解析
  - id: step_4
    name: ReadSOC
    type: engineer.test
    params:
      command: 'socid=0%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 5: 创建 device.json 文件
  # 从前面步骤的结果中提取数据并创建 JSON 文件
  # 文件路径: TestTool\Result\upload\${sn}\device.json
  - id: step_5
    name: CreateDeviceJson
    type: case.create_device_json
    params:
      step_6_id: 'step_6'
      output_dir: 'Result/upload'
    timeout: 30000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 6: 将 JSON 推送到狗上
  # 注意：transfer=2,<addrA>,<addrB>% 表示从 addrA 推送到 addrB
  - id: step_6
    name: UploadJsonToRobot
    type: engineer.test
    params:
      command: 'transfer=2,Result/upload/${sn}/device.json,/app_param%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 60
    timeout: 70000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null
 
  # Step 7: 将 JSON 推送到云端
  # 注意：执行 JSON 文件的云端上传操作，完成测试数据的云端备份
  - id: step_7
    name: UploadJsonToCloud
    type: engineer.test
    params:
      command: 'upload=1%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 8: 蓝牙检测
  - id: step_8
    name: BluetoothTest
    type: engineer.test
    params:
      command: 'bt=0%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 300

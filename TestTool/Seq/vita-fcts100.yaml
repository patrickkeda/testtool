version: '1.0'
metadata:
  name: vita-s100fct
  description: 'VITA S100 FCT 测试序列'
  author: 'TestTool'
  created_at: '2025-12-15T23:00:00.000000'
  product: Vita01
  station: S100_FCT
  version: '1.0'

variables:
  # 工程模式（S100本体）
  robot_ip: "192.168.125.2"
  robot_port: 3579

  # PLC（通过 COM3，参数参考 ModScan 截图）
  plc_serial_port: "COM3"
  plc_baudrate: 19200
  plc_parity: "O"      # ODD
  plc_stopbits: 1
  plc_bytesize: 8
  plc_timeout: 5
  plc_unit_id: 1

steps:
  # Step 1: 扫描 SN
  - id: step_1
    name: ScanSN
    type: scan.sn
    params: {}
    timeout: 5000
    retries: 3
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 2: 治具触摸气缸控制 - 显示交互操作提示
  - id: step_2
    name: FixtureTouchControl
    type: utility.confirm
    params:
      title: '治具触摸气缸控制'
      message: '请将板子放好并压紧治具'
      confirm_text: '确认完成'
      allow_cancel: false
    timeout: null
    retries: 0
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 3: 连接 PLC (Modbus RTU, COM3)
  - id: step_3
    name: ConnectPLC
    type: plc.modbus.connect
    params:
      port: '${plc_serial_port}'
      baudrate: ${plc_baudrate}
      parity: '${plc_parity}'
      stopbits: ${plc_stopbits}
      bytesize: ${plc_bytesize}
      timeout: ${plc_timeout}
    timeout: 10000
    retries: 3
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 4: S100 上电 - 向寄存器 40084 写 1
  - id: step_4
    name: S100PowerOn
    type: plc.modbus.write_register
    params:
      address: 84         # 对应 40084
      value: 1
      unit_id: ${plc_unit_id}
      description: 's100 上电 (40084=1)'
    timeout: 5000
    retries: 2
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 5: 延时 100 秒
  - id: step_5
    name: DelayAfterPowerOn
    type: utility.delay
    params:
      duration_ms: 90000
    timeout: 95000
    retries: 0
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 6: 进入工程模式 (enfac=1,1%)
  - id: step_6

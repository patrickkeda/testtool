  - id: step_1
    name: ScanSN
    type: scan.sn
    params:
      dialog_title: '扫描/输入产品SN'
      hint: '请扫描/输入SN（共19位，且前5位为80100）后回车'
      regex: '^80100[A-Z0-9]{14}$'
      timeout_ms: 60000
    timeout: 5000
    retries: 3
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # Step 2: 工程模式


  # 步骤24: GNSS 检测 (gnss=0%)
  - id: step_24
    name: GNSSDetection
    type: engineer.test
    params:
      command: 'gnss=0%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # # 步骤25 MIC检测 (MIC=0%)
  - id: step_25
    name: AudioLoopbackDetection
    type: engineer.test
    params:
      command: 'mic=0%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000

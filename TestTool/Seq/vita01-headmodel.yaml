    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # 步骤26: 气缸解除 (在 R1 位置写 1，对应地址 2050)
  - id: step_26
    name: ReleaseCylinder
    type: plc.modbus.write_register
    params:
      address: 2050
      value: 1
      unit_id: ${plc_unit_id}
      use_coil: true
      description: '气缸解除：写寄存器 002050 (R1) = 1'
    timeout: 5000
    retries: 2
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # 步骤27: 断开 PLC 连接（失败不影响整体结果）
  - id: step_27
    name: PlcDisconnect
    type: plc.modbus.disconnect
    params: {}
    timeout: 5000
    retries: 1

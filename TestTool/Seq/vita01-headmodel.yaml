    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # 步骤28: 测试完成
  # 注意：此步骤可以是一个空步骤或者断开连接步骤，根据实际需求添加
  - id: step_28
    name: TestComplete
    type: utility.delay
    params:
      duration_ms: 100
    timeout: 2000
    retries: 0
    condition: null
    expect: null
    on_failure: continue
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

# 序列级别默认配置
timeout: null
retries: 0
on_failure: stop


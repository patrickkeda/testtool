    manual_judgment_config: null

  # 步骤22: 4G 信号检测 (sig4g=0%)
  - id: step_22
    name: Signal4GDetection
    type: engineer.test
    params:
      command: 'sig4g=0%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
    retries: 1
    condition: null
    expect: null
    on_failure: fail
    at_config: null
    state_measurement_config: null
    manual_judgment_config: null

  # 步骤23: WiFi 检测 (wifi=0%)，检测 VitaDynamics 网络
  - id: step_23
    name: WiFiDetection
    type: engineer.test
    params:
      command: 'wifi=0%'
      robot_ip: '${robot_ip}'
      port: ${robot_port}
      timeout: 30
    timeout: 35000
